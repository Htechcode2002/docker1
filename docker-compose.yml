services:
  next-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: charles0202/my-next-app:v2
    container_name: test4-app
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_USER=myuser
      - DB_PASSWORD=mypassword
      - DB_NAME=myapp_db
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: test4-db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=myapp_db
      - MYSQL_USER=myuser
      - MYSQL_PASSWORD=mypassword
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    restart: always

volumes:
  mysql_data:
